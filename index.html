<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/img/FAV-ICON-CIRCULO.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
    <title>Intro Cancas 2D</title>
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container justify-content-center text-center">
            <span class="navbar-text text-light">
                <strong>Programador:</strong> Roman Resendiz Vargas |
                Ingeniería en Sistemas Computacionales
            </span>
        </div>
    </nav>

    <main class="container flex-column mt-3 shadow rounded-3 p-3 bg-white">

        <div class="d-flex justify-content-center flex-row mb-3">
            <h1>Objetos 2D mediante OOP</h1>
        </div>

        <div class="d-flex flex-row shadow-sm mb-1 p-3 justify-content-around">

            <div class="d-flex justify-content-center flex-column mb-3">
                <h5 class="d-flex justify-content-center">Objeto 2D</h5>
                <canvas class="border shadow" id="canvasOOP"></canvas>
            </div>

            <div class="d-flex justify-content-center flex-column mb-3">
                <h5 class="d-flex justify-content-center">Objeto con Random</h5>
                <canvas class="border shadow" id="canvasRandom"></canvas>
            </div>

            <div class="d-flex justify-content-center flex-column mb-3">
                <h5 class="d-flex justify-content-center">Múltiples objetos</h5>
                <canvas class="border shadow" id="canvasMultiple"></canvas>
            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-light text-center mt-4 p-3">
        <div class="container">
            <p class="mb-1">
                Programador: Roman Resendiz Vargas | Ingeniería en Sistemas Computacionales
            </p>
            <p class="mb-0">
                M.C Víctor Manuel Pinedo Fernández – Graficación
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script src="assets/js/main.js"></script>

</body>

</html>
