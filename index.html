<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="./assets/img/FAV-ICON-CIRCULO.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Intro Canvas 2D</title>

<style>

/* BACKGROUND GENERAL CON DEGRADADO */

body{

    background: linear-gradient(
        135deg,
        #6366f1,
        #8b5cf6,
        #ec4899
    );

    min-height:100vh;

    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

}

/* NAVBAR */

.navbar-custom{

    background:rgba(15,23,42,.9);

    backdrop-filter: blur(6px);

    color:white;

    font-size:14px;

}

/* TITULO */

.title{

    font-weight:600;

    color:#0f172a;

}

/* CONTENEDOR */

.main-container{

    background:white;

    border-radius:16px;

}

/* TARJETAS */

.canvas-card{

    background:white;

    padding:20px;

    border-radius:12px;

    transition:all .35s ease;

    box-shadow:0 6px 18px rgba(0,0,0,.08);

}

/* HOVER TARJETAS */

.canvas-card:hover{

    transform:translateY(-10px) scale(1.02);

    box-shadow:0 20px 40px rgba(0,0,0,.2);

}

/* CANVAS */

canvas{

    border-radius:10px;

    transition:all .3s ease;

}

/* EFECTO HOVER CANVAS */

.canvas-card:hover canvas{

    box-shadow:0 0 30px rgba(99,102,241,.35);

}

/* TITULOS */

.canvas-title{

    font-weight:500;

    color:#334155;

}

/* FOOTER */

footer{

    background:rgba(15,23,42,.9);

    backdrop-filter: blur(6px);

    color:#e2e8f0;

    font-size:14px;

}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-custom p-3">

<div class="container justify-content-center text-center">

Programador:
<strong class="ms-1">Roman Resendiz Vargas</strong>

<span class="mx-2">|</span>

Ingeniería en Sistemas Computacionales

</div>

</nav>

<!-- CONTENIDO -->

<main class="container main-container mt-5 shadow-lg p-4">

<div class="text-center mb-4">

<h1 class="title">
Objetos 2D mediante OOP
</h1>

</div>

<div class="row g-4 justify-content-center">

<!-- CANVAS 1 -->

<div class="col-md-4">

<div class="canvas-card text-center">

<h5 class="canvas-title mb-3">
Objeto 2D
</h5>

<canvas class="border shadow-sm" id="canvasOOP"></canvas>

</div>

</div>

<!-- CANVAS 2 -->

<div class="col-md-4">

<div class="canvas-card text-center">

<h5 class="canvas-title mb-3">
Objeto con Random
</h5>

<canvas class="border shadow-sm" id="canvasRandom"></canvas>

</div>

</div>

<!-- CANVAS 3 -->

<div class="col-md-4">

<div class="canvas-card text-center">

<h5 class="canvas-title mb-3">
Múltiples objetos
</h5>

<canvas class="border shadow-sm" id="canvasMultiple"></canvas>

</div>

</div>

</div>

</main>

<!-- FOOTER -->

<footer class="text-center mt-5 p-4">

<div class="container">

<div class="mb-1">
Programador: Roman Resendiz Vargas
</div>

<div class="mb-1">
Ingeniería en Sistemas Computacionales
</div>

<div>
M.C Víctor Manuel Pinedo Fernández – Graficación
</div>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/main.js"></script>

</body>

</html>
